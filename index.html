<script>
"use strict";

// ================ MATH ================
const{sin,cos,sqrt,atan2,PI,abs,min,max,floor,random,exp,pow,hypot,round,tanh}=Math;
const TAU=PI*2;
const rand=(a=0,b=1)=>a+(b-a)*random();
const rI=(a,b)=>floor(rand(a,b+.999));
const cl=(v,l,h)=>v<l?l:v>h?h:v;
const lr=(a,b,t)=>a+(b-a)*t;
const $=id=>document.getElementById(id);
const O=(id,v)=>{const e=$(id);if(e)e.textContent=v};
const hx=a=>round(cl(a,0,255)).toString(16).padStart(2,'0');

// ================ CONFIG ================
const W=1600, BX=W/2, BY=W*.82;
const BASE={x:BX,y:BY};
const G={spd:1};

// LIMITS - prevents crashes
const MAX_ENEMIES=40;
const MAX_MISSILES=30;
const MAX_PARTICLES=200;
const MAX_EXPLOSIONS=15;
const MAX_DEBRIS=60;
const MAX_TRAIL=40;

// ================ OBJECT POOLS ================
// Pre-allocate arrays, reuse objects
let enemies=[];
let missiles=[];
let explosions=[];
let particles=[];
let debris=[];
let launchers=[];
let aiDecs=[];

let bgCanvas,bgCtx,mainCanvas,mainCtx;
let vW,vH,sX,sY;
let bgDrawn=false;

let simOn=false,sT=0,fc=0,lastWv=0;
let stats={inn:0,kills:0,leak:0,fired:0};
let rAng=0;
let hAcc=[],hLoss=[];
let stars=null;

// Quality auto-adjustment
let quality=1; // 1=full, 0.5=reduced
let fpsHistory=[];

// ================ THREAT TYPES ================
const TT={
  0:{n:'SRBM',c:'#f44',fc:'#f80',fi:'#fd4',s:[250,700],g:6,sz:5},
  1:{n:'LACM',c:'#fa0',fc:'#fc4',fi:'#fff',s:[150,450],g:0,sz:4},
  2:{n:'ASBM',c:'#f0f',fc:'#f6f',fi:'#faf',s:[300,800],g:2,sz:5},
  3:{n:'HGV',c:'#f06',fc:'#f48',fi:'#fcd',s:[1000,2500],g:1,sz:6}
};

// ================ LIGHTWEIGHT AI ================
class AI{
  constructor(){
    this.D=32; // embed dim - small for perf
    this.Wi=this._rw(16,32);this.bi=new Float32Array(32);
    this.Wq=this._rw(32,32);this.Wk=this._rw(32,32);
    this.Wv=this._rw(32,32);this.Wo=this._rw(32,32);
    this.Wf1=this._rw(32,64);this.bf1=new Float32Array(64);
    this.Wf2=this._rw(64,32);this.bf2=new Float32Array(32);
    this.Wp1=this._rw(32,16);this.bp1=new Float32Array(16);
    this.Wp2=this._rw(16,5);this.bp2=new Float32Array(5);
    this.Ww1=this._rw(32,16);this.bw1=new Float32Array(16);
    this.Ww2=this._rw(16,4);this.bw2=new Float32Array(4);
    this.ep=0;this.pL=1;this.conf=0;this.infT=0;
    this.attn=null;
    this.buf=[];this.maxBuf=3000;
    this._ws=this._all();
    this._m=this._ws.map(w=>new Float32Array(w.length));
    this._v=this._ws.map(w=>new Float32Array(w.length));
    this._t=0;
  }
  _rw(r,c){const w=new Float32Array(r*c);const s=sqrt(2/r);for(let i=0;i<w.length;i++)w[i]=(random()-.5)*s;return w}
  _all(){return[this.Wi,this.bi,this.Wq,this.Wk,this.Wv,this.Wo,this.Wf1,this.bf1,this.Wf2,this.bf2,this.Wp1,this.bp1,this.Wp2,this.bp2,this.Ww1,this.bw1,this.Ww2,this.bw2]}
  np(){let n=0;for(const w of this._ws)n+=w.length;return n}

  // Optimized matmul
  _mm(A,m,k,B,n,C){
    for(let i=0;i<m;i++){
      const ro=i*k;
      for(let j=0;j<n;j++){
        let s=0;
        for(let p=0;p<k;p++)s+=A[ro+p]*B[p*n+j];
        C[i*n+j]=s;
      }
    }
  }
  _ab(A,b,m,n){for(let i=0;i<m;i++){const o=i*n;for(let j=0;j<n;j++)A[o+j]+=b[j]}}
  _gelu(A,len){
    const c=0.7978845608;
    for(let i=0;i<len;i++){
      const x=A[i];
      A[i]=.5*x*(1+tanh(c*(x+.044715*x*x*x)));
    }
  }
  _sig(x){return 1/(1+exp(-cl(x,-12,12)))}

  forward(feats,n){
    const t0=performance.now();
    if(n>15)n=15; // hard limit
    const D=this.D;

    // Reuse buffers where possible
    const H=new Float32Array(n*D);
    this._mm(feats,n,16,this.Wi,D,H);
    this._ab(H,this.bi,n,D);
    this._gelu(H,n*D);

    // Positional encoding - simple
    for(let i=0;i<n;i++){
      for(let j=0;j<D;j+=2){
        const f=1/pow(10000,j/D);
        H[i*D+j]+=sin(i*f)*.1;
        if(j+1<D)H[i*D+j+1]+=cos(i*f)*.1;
      }
    }

    // Self-attention
    const Q=new Float32Array(n*D);
    const K=new Float32Array(n*D);
    const V=new Float32Array(n*D);
    this._mm(H,n,D,this.Wq,D,Q);
    this._mm(H,n,D,this.Wk,D,K);
    this._mm(H,n,D,this.Wv,D,V);

    const sc=1/sqrt(D);
    const scores=new Float32Array(n*n);
    for(let i=0;i<n;i++){
      let mx=-1e9;
      for(let j=0;j<n;j++){
        let s=0;for(let k=0;k<D;k++)s+=Q[i*D+k]*K[j*D+k];
        scores[i*n+j]=s*sc;mx=max(mx,s*sc);
      }
      let sm=0;
      for(let j=0;j<n;j++){scores[i*n+j]=exp(scores[i*n+j]-mx);sm+=scores[i*n+j]}
      for(let j=0;j<n;j++)scores[i*n+j]/=(sm+1e-10);
    }
    this.attn={d:scores,n:n};

    const att=new Float32Array(n*D);
    this._mm(scores,n,n,V,D,att);
    const proj=new Float32Array(n*D);
    this._mm(att,n,D,this.Wo,D,proj);

    // Residual
    const H2=new Float32Array(n*D);
    for(let i=0;i<H2.length;i++)H2[i]=H[i]+proj[i];

    // FFN
    const ff=new Float32Array(n*64);
    this._mm(H2,n,D,this.Wf1,64,ff);
    this._ab(ff,this.bf1,n,64);
    this._gelu(ff,n*64);
    const ffo=new Float32Array(n*D);
    this._mm(ff,n,64,this.Wf2,D,ffo);
    this._ab(ffo,this.bf2,n,D);

    const H3=new Float32Array(n*D);
    for(let i=0;i<H3.length;i++)H3[i]=H2[i]+ffo[i];

    // Policy
    const ph=new Float32Array(n*16);
    this._mm(H3,n,D,this.Wp1,16,ph);
    this._ab(ph,this.bp1,n,16);
    this._gelu(ph,n*16);
    const pol=new Float32Array(n*5);
    this._mm(ph,n,16,this.Wp2,5,pol);
    this._ab(pol,this.bp2,n,5);

    // World model
    const wh=new Float32Array(n*16);
    this._mm(H3,n,D,this.Ww1,16,wh);
    this._ab(wh,this.bw1,n,16);
    this._gelu(wh,n*16);
    const wm=new Float32Array(n*4);
    this._mm(wh,n,16,this.Ww2,4,wm);
    this._ab(wm,this.bw2,n,4);

    this.infT=performance.now()-t0;
    return{pol,wm};
  }

  decide(targets){
    if(!targets.length)return[];
    const n=min(targets.length,15);
    const feats=new Float32Array(n*16);
    for(let i=0;i<n;i++){
      const t=targets[i];
      const d=hypot(t.x-BX,t.y-BY);
      const sp=hypot(t.vx,t.vy);
      const hd=atan2(t.vy,t.vx);
      const cr=-((t.x-BX)*t.vx+(t.y-BY)*t.vy)/(d*sp+1);
      const j=i*16;
      feats[j]=t.x/W;feats[j+1]=t.y/W;feats[j+2]=t.vx/2000;feats[j+3]=t.vy/2000;
      feats[j+4]=(t.ax||0)/300;feats[j+5]=(t.ay||0)/300;
      feats[j+6]=sp/2000;feats[j+7]=hd/PI;feats[j+8]=d/W;feats[j+9]=t.threat;
      feats[j+10]=t.type/4;feats[j+11]=min((sT-t.born)/60,1);
      feats[j+12]=t.man?1:0;feats[j+13]=cr;
      feats[j+14]=t.eng?1:0;feats[j+15]=t.asgn/3;
    }
    const{pol,wm}=this.forward(feats,n);
    const hz=+$('cHz').value;
    let tc=0;
    const decs=[];
    for(let i=0;i<n;i++){
      const pr=this._sig(pol[i*5]);
      const cf=this._sig(pol[i*5+4]);
      tc+=cf;
      decs.push({
        tgt:targets[i],pri:pr,conf:cf,
        ix:targets[i].x+wm[i*4]*hz*300,
        iy:targets[i].y+wm[i*4+1]*hz*300
      });
    }
    this.conf=n?tc/n:0;
    return decs.sort((a,b)=>b.pri-a.pri);
  }

  addExp(e){this.buf.push(e);if(this.buf.length>this.maxBuf)this.buf.shift()}

  train(iters=1){
    if(this.buf.length<16)return;
    const lr=+$('cLR').value;
    for(let it=0;it<iters;it++){
      this._t++;
      const grads=this._ws.map(w=>new Float32Array(w.length));
      let tl=0,cnt=0;
      const bs=min(16,this.buf.length);
      for(let b=0;b<bs;b++){
        const s=this.buf[rI(0,this.buf.length-1)];
        if(!s.f||s.f.length!==16)continue;
        const f=new Float32Array(16);f.set(s.f);
        const{pol}=this.forward(f,1);
        const pred=this._sig(pol[0]);
        const tgt=s.thr;
        const err=pred-tgt;
        tl+=err*err;cnt++;
        const eps=.001;
        for(let wi=0;wi<this._ws.length;wi++){
          const w=this._ws[wi];
          const np=min(3,w.length);
          for(let p=0;p<np;p++){
            const idx=rI(0,w.length-1);
            const old=w[idx];
            w[idx]=old+eps;
            const{pol:p2}=this.forward(f,1);
            const pr2=this._sig(p2[0]);
            const e2=pr2-tgt;
            const l2=e2*e2-(s.hit?s.rwd*pr2:0)*.3;
            const l1=err*err-(s.hit?s.rwd*pred:0)*.3;
            grads[wi][idx]+=(l2-l1)/eps;
            w[idx]=old;
          }
        }
      }
      if(!cnt)continue;
      let gn=0;
      for(const g of grads)for(let i=0;i<g.length;i++)gn+=g[i]*g[i];
      gn=sqrt(gn);
      const cs=gn>2?2/gn:1;
      for(let wi=0;wi<this._ws.length;wi++){
        const w=this._ws[wi],g=grads[wi];
        const m=this._m[wi],v=this._v[wi];
        for(let i=0;i<w.length;i++){
          const gi=g[i]*cs/cnt;
          m[i]=.9*m[i]+.1*gi;v[i]=.999*v[i]+.001*gi*gi;
          const mh=m[i]/(1-pow(.9,this._t));
          const vh=v[i]/(1-pow(.999,this._t));
          w[i]-=lr*mh/(sqrt(vh)+1e-8);
          w[i]=cl(w[i],-3,3);
        }
      }
      this.pL=tl/cnt;this.ep++;
    }
  }
}

// ================ SPAWN ================

  const side=rI(0,2);

  if(side===0){x=rand(100,W-100);y=rand(-80,-10)}
  else if(side===1){x=rand(-80,-10);y=rand(100,W*.4)}
  else{x=rand(W+10,W+80);y=rand(100,W*.4)}
  const tx=BX+rand(-250,250),ty=BY+rand(-120,40);
  const ang=atan2(ty-y,tx-x);

    id:'T'+(++stats.inn),x,y,

    trail:[],threat:.5,man:type===2,
    mT:0,mF:rand(.3,2),mA:rand(40,180),
    eng:false,asgn:0,sz:ti.sz,ff:rand(.7,1.2)
  };

// ================ INTERCEPT SOLVER ================
function solve(tgt,lp,iSpd){
  let best=null,be=1e9;
  const gv=TT[tgt.type]?.g||0;
  for(let s=1;s<=50;s++){
    const t=s*.5;
    const tx=tgt.x+tgt.vx*t+.5*(tgt.ax||0)*t*t;
    const ty=tgt.y+tgt.vy*t+.5*((tgt.ay||0)+gv)*t*t;
    const d=hypot(tx-lp.x,ty-lp.y);
    const it=d/iSpd;
    const er=abs(it-t);
    if(er<be&&it<=t*1.3){be=er;best={x:tx,y:ty,t,d}}
  }
  return best;
}

// ================ FIRE ================
function fire(la,tgt,ip){
  if(la.m<=0||la.st!=='ok'||missiles.length>=MAX_MISSILES)return;
  const iSpd=+$('cIS').value;
  const ang=atan2(ip.y-la.y,ip.x-la.x);
  missiles.push({
    id:'M'+(++stats.fired),x:la.x,y:la.y-6,
    vx:cos(ang)*iSpd,vy:sin(ang)*iSpd,speed:iSpd,
    tgt,alive:true,age:0,trail:[],
    ph:'mid',pLOS:atan2(tgt.y-la.y,tgt.x-la.x),ff:rand(.6,1),smT:0
  });
  la.m--;la.st='rl';la.rt=+$('cRL').value;la.fa=1;
  tgt.eng=true;tgt.asgn++;
  boom(la.x,la.y-6,'#0cf',10,.3);
  log(`→ ${missiles[missiles.length-1].id}→${tgt.id} PU${la.id}`,'l');
}

// ================ PN GUIDANCE ================
function guide(m,dt){
  const t=m.tgt;
  if(!t||!t.alive){m.alive=false;return}
  const dx=t.x-m.x,dy=t.y-m.y;
  const r=hypot(dx,dy);
  const LOS=atan2(dy,dx);
  const LOSr=(LOS-m.pLOS)/dt;
  m.pLOS=LOS;
  const Vc=-((dx*(t.vx-m.vx)+dy*(t.vy-m.vy))/r);
  if(r<200&&m.ph==='mid')m.ph='term';
  const N=m.ph==='term'?5:3.5;
  const ac=N*Vc*LOSr;
  const va=atan2(m.vy,m.vx);
  let ax=-sin(va)*ac,ay=cos(va)*ac;
  const am=hypot(ax,ay),mx=400;
  if(am>mx){ax*=mx/am;ay*=mx/am}
  m.vx+=ax*dt;m.vy+=ay*dt;
  const cs=hypot(m.vx,m.vy);
  if(cs>0){m.vx=m.vx/cs*m.speed;m.vy=m.vy/cs*m.speed}
  const kr=+$('cKR').value;
  if(r<kr){
    t.alive=false;m.alive=false;stats.kills++;
    boom((t.x+m.x)/2,(t.y+m.y)/2,'#f80',30,1.2);
    boom((t.x+m.x)/2,(t.y+m.y)/2,'#fff',12,.3);
    mkDebris((t.x+m.x)/2,(t.y+m.y)/2,8);
    log(`✓ KILL ${m.id}→${t.id} D=${round(r)}m`,'h');
    ai.addExp(mkExp(t,true,r));
    return;
  }
  if(m.age>30||m.x<-200||m.x>W+200||m.y<-200||m.y>W+200){
    m.alive=false;log(`✗ ${m.id} miss`,'m');
  }
}

function mkExp(t,hit,err){
  const d=hypot(t.x-BX,t.y-BY),sp=hypot(t.vx,t.vy);
  const hd=atan2(t.vy,t.vx),cr=-((t.x-BX)*t.vx+(t.y-BY)*t.vy)/(d*sp+1);
  const f=new Float32Array(16);
  f[0]=t.x/W;f[1]=t.y/W;f[2]=t.vx/2000;f[3]=t.vy/2000;
  f[4]=(t.ax||0)/300;f[5]=(t.ay||0)/300;f[6]=sp/2000;f[7]=hd/PI;
  f[8]=d/W;f[9]=t.threat;f[10]=t.type/4;f[11]=min((sT-t.born)/60,1);
  f[12]=t.man?1:0;f[13]=cr;f[14]=t.eng?1:0;f[15]=t.asgn/3;
  return{f,thr:t.threat,hit,err:err||999,rwd:hit?(1+d/W*.5):(d<50?-2:-.5)};
}

// ================ EFFECTS (pool limited) ================
function boom(x,y,c,sz,dur){
  if(explosions.length>=MAX_EXPLOSIONS){explosions.shift()}
  explosions.push({x,y,c,sz,dur,t:0});
  if(!$('cSm').checked)return;
  const n=min(sz>20?20:10,MAX_PARTICLES-particles.length);
  for(let i=0;i<n;i++){
    const a=rand(0,TAU),s=rand(30,160);
    particles.push({x,y,vx:cos(a)*s,vy:sin(a)*s,life:rand(.2,.8),ml:.8,c,sz:rand(1,3),tp:'s'});
  }
}

function mkDebris(x,y,n){
  n=min(n,MAX_DEBRIS-debris.length);
  for(let i=0;i<n;i++){
    const a=rand(0,TAU),s=rand(50,200);
    debris.push({x,y,vx:cos(a)*s,vy:sin(a)*s,life:rand(.4,1.5),ml:1.5,sz:rand(1,4),rot:rand(0,TAU),rv:rand(-8,8)});
  }
}

// ================ AI CYCLE (throttled) ================
let lastAI=0;
function aiCycle(){
  if(sT-lastAI<.5)return; // max 2Hz
  lastAI=sT;

  // Threat update
  for(const e of enemies){
    if(!e.alive)continue;
    const d=hypot(e.x-BX,e.y-BY),sp=hypot(e.vx,e.vy);
    const cr=-((e.x-BX)*e.vx+(e.y-BY)*e.vy)/(d*sp+1);
    e.threat=cl(.25*(1-d/W)+.25*(sp/1500)+.25*max(0,cr)+.15*(e.man?1:0)+.1*(e.type===3?1:0),0,1);
  }

  const tgts=enemies.filter(e=>e.alive);
  if(!tgts.length)return;

  if($('cAI').checked){
    aiDecs=ai.decide(tgts);
    for(const dec of aiDecs){
      const t=dec.tgt;
      if(!t.alive||t.asgn>=2||dec.pri<.2)continue;
      const d=hypot(t.x-BX,t.y-BY);
      if(d>W||d<20)continue;
      let bl=null,bd=1e9;
      for(const l of launchers){if(l.m>0&&l.st==='ok'){const d2=hypot(l.x-t.x,l.y-t.y);if(d2<bd){bd=d2;bl=l}}}
      if(!bl)continue;
      const ip=solve(t,bl,+$('cIS').value);
      if(ip){fire(bl,t,ip);break}
    }
  }else{
    const sorted=[...tgts].filter(e=>!e.eng).sort((a,b)=>hypot(a.x-BX,a.y-BY)-hypot(b.x-BX,b.y-BY));
    for(const t of sorted){
      if(hypot(t.x-BX,t.y-BY)>W*.7)continue;
      let bl=null;for(const l of launchers)if(l.m>0&&l.st==='ok')if(!bl||l.m>bl.m)bl=l;
      if(!bl)continue;
      const ip=solve(t,bl,+$('cIS').value);
      if(ip){fire(bl,t,ip);break}
    }
  }
}

// ================ UPDATE ================
function update(dt){
  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(!e.alive){enemies.splice(i,1);continue}
    if(e.type===2){e.mT+=dt;const a=sin(e.mT*e.mF*TAU)*e.mA;const h=atan2(e.vy,e.vx);e.ax=cos(h+PI/2)*a;e.ay=sin(h+PI/2)*a}
    if(e.type===0)e.ay=(e.ay||0)+1.5*dt;
    e.vx+=(e.ax||0)*dt;e.vy+=(e.ay||0)*dt;
    e.x+=e.vx*dt;e.y+=e.vy*dt;
    if($('cTr').checked&&quality>.5){e.trail.push({x:e.x,y:e.y});while(e.trail.length>MAX_TRAIL)e.trail.shift()}
    const dB=hypot(e.x-BX,e.y-BY);
    if(dB<22){
      e.alive=false;stats.leak++;
      boom(e.x,e.y,'#f00',35,1.5);
      log(`✗ LEAKER ${e.id}!`,'m');
      ai.addExp(mkExp(e,false,999));
    }
    if(e.x<-300||e.x>W+300||e.y<-300||e.y>W+300)e.alive=false;
  }

  // Missiles
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    if(!m.alive){missiles.splice(i,1);continue}
    m.age+=dt;guide(m,dt);
    m.x+=m.vx*dt;m.y+=m.vy*dt;
    if($('cTr').checked&&quality>.5){m.trail.push({x:m.x,y:m.y});while(m.trail.length>MAX_TRAIL)m.trail.shift()}
    if($('cSm').checked&&quality>.5){
      m.smT-=dt;
      if(m.smT<=0&&particles.length<MAX_PARTICLES){
        m.smT=.05;
        particles.push({x:m.x-m.vx*.005,y:m.y-m.vy*.005,vx:rand(-5,5),vy:rand(-5,5),life:rand(.2,.5),ml:.5,c:'#888',sz:rand(1,2),tp:'k'});
      }
    }
  }

  // Launchers
  for(const l of launchers){
    if(l.st==='rl'){l.rt-=dt;if(l.rt<=0){l.st='ok';l.rt=0}}
    if(l.fa>0)l.fa=max(0,l.fa-dt*3);
  }

  // Effects
  for(let i=explosions.length-1;i>=0;i--){explosions[i].t+=dt;if(explosions[i].t>=explosions[i].dur)explosions.splice(i,1)}
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.tp==='k'){p.vx*=.9;p.vy*=.9;p.vy-=12*dt}else{p.vx*=.95;p.vy*=.95;p.vy+=20*dt}
    p.life-=dt;if(p.life<=0)particles.splice(i,1);
  }
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];d.x+=d.vx*dt;d.y+=d.vy*dt;d.vy+=60*dt;d.rot+=d.rv*dt;d.life-=dt;
    if(d.life<=0)debris.splice(i,1);
  }

  aiCycle();

  // Training (very infrequent)
  if(fc%60===0&&ai.buf.length>30)ai.train(1);

  // Auto waves
  if($('cAW').checked){
    const iv=+$('cInt').value;
    if(sT-lastWv>iv){lastWv=sT;const n=rI(1,+$('cWN').value);for(let i=0;i<min(n,8);i++)setTimeout(()=>spawn(),i*80)}
  }

  rAng=(rAng+dt*1.5)%TAU;
}

// ================ RENDER (optimized) ================
function render(){
  drawBg();
  const c=mainCtx;
  c.clearRect(0,0,vW,vH);
  const bx=BX*sX,by=BY*sY;

  // Zones
  if($('cZn').checked){
    c.beginPath();c.arc(bx,by,W*.55*sX,PI*.05,PI*.95);
    c.strokeStyle='#0f82';c.lineWidth=1;c.setLineDash([5,8]);c.stroke();c.setLineDash([]);
    c.beginPath();c.arc(bx,by,W*.28*sX,0,TAU);
    c.strokeStyle='#f801';c.setLineDash([3,6]);c.stroke();c.setLineDash([]);
  }

  // Radar sweep
  c.save();c.globalAlpha=.06;c.beginPath();c.moveTo(bx,by);
  c.arc(bx,by,W*.7*sX,rAng-.2,rAng);c.closePath();c.fillStyle='#0f8';c.fill();c.restore();

  // Trails (batched)
  if($('cTr').checked){
    c.lineWidth=1;
    for(const e of enemies){
      if(e.trail.length<2)continue;
      c.beginPath();c.moveTo(e.trail[0].x*sX,e.trail[0].y*sY);
      for(let i=1;i<e.trail.length;i++)c.lineTo(e.trail[i].x*sX,e.trail[i].y*sY);
      c.strokeStyle=TT[e.type].c+'55';c.stroke();
    }
    for(const m of missiles){
      if(m.trail.length<2)continue;
      c.beginPath();c.moveTo(m.trail[0].x*sX,m.trail[0].y*sY);
      for(let i=1;i<m.trail.length;i++)c.lineTo(m.trail[i].x*sX,m.trail[i].y*sY);
      c.strokeStyle='#0cf44';c.stroke();
    }
  }

  // AI Predictions
  if($('cPr').checked){
    for(const d of aiDecs){
      if(!d.tgt.alive)continue;
      const tx=d.tgt.x*sX,ty=d.tgt.y*sY;
      const ix=cl(d.ix,0,W)*sX,iy=cl(d.iy,0,W)*sY;
      c.beginPath();c.moveTo(tx,ty);c.lineTo(ix,iy);
      c.strokeStyle=`rgba(180,120,255,${d.conf*.4})`;c.lineWidth=1;c.setLineDash([3,4]);c.stroke();c.setLineDash([]);
      c.beginPath();c.arc(ix,iy,5,0,TAU);c.strokeStyle='#b88f8';c.lineWidth=1;c.stroke();
      if(d.pri>.3&&$('cLb').checked){
        c.fillStyle=`rgba(255,${round(255*(1-d.pri))},0,.8)`;c.font='bold 8px monospace';
        c.fillText(`P:${(d.pri*100)|0}`,tx+12,ty-10);
      }
    }
  }

  // Launchers
  for(const l of launchers){
    const lx=l.x*sX,ly=l.y*sY;
    c.save();c.translate(lx,ly);
    c.fillStyle='#182818';c.fillRect(-14,-5,28,15);
    c.strokeStyle=l.st==='ok'?'#0f8':'#fa0';c.lineWidth=1;c.strokeRect(-14,-5,28,15);

    // Missile dots
    for(let i=0;i<l.mx;i++){
      c.beginPath();c.arc(-l.mx*2.2+i*4.4,14,1.5,0,TAU);
      c.fillStyle=i<l.m?'#0f8':'#333';c.fill();
    }

    // Turret
    let ta=-PI/2,nd=1e9;
    for(const e of enemies){const d=hypot(e.x-l.x,e.y-l.y);if(d<nd){nd=d;ta=atan2(e.y-l.y,e.x-l.x)}}
    l.ang=lr(l.ang,ta,.06);
    c.save();c.rotate(l.ang);
    c.fillStyle='#3a6a3a';c.fillRect(0,-2.5,16,5);
    c.fillStyle='#4a8a4a';c.fillRect(13,-2,5,4);
    if(l.fa>0){c.beginPath();c.arc(18,0,4+l.fa*10,0,TAU);c.fillStyle=`rgba(0,255,200,${l.fa})`;c.fill()}
    c.restore();

    c.fillStyle=l.st==='ok'?'#0f8':'#fa0';c.font='bold 7px monospace';c.textAlign='center';
    c.fillText(`PU${l.id}[${l.m}]`,0,22);
    if(l.st==='rl')c.fillText(`${l.rt.toFixed(1)}s`,0,30);
    c.textAlign='left';c.restore();
  }

  // Enemies
  for(const e of enemies){
    const ex=e.x*sX,ey=e.y*sY;
    // Culling
    if(ex<-20||ex>vW+20||ey<-20||ey>vH+20)continue;
    const ti=TT[e.type];
    const hd=atan2(e.vy,e.vx);
    const sz=e.sz;

    c.save();c.translate(ex,ey);c.rotate(hd);

    // Body
    c.beginPath();
    c.moveTo(sz*2,0);c.lineTo(sz*.5,-sz*.8);c.lineTo(-sz,-sz*.6);
    c.lineTo(-sz*1.3,-sz);c.lineTo(-sz*1,-sz*.3);c.lineTo(-sz*1.5,0);
    c.lineTo(-sz*1,sz*.3);c.lineTo(-sz*1.3,sz);c.lineTo(-sz,sz*.6);
    c.lineTo(sz*.5,sz*.8);c.closePath();
    c.fillStyle=ti.c;c.fill();

    // Nose highlight
    c.beginPath();c.moveTo(sz*2,0);c.lineTo(sz*.8,-sz*.3);c.lineTo(sz*.8,sz*.3);c.closePath();
    c.fillStyle='#fff2';c.fill();

    // Flame
    const fl=e.ff*(1+rand(-.15,.15));
    c.beginPath();c.moveTo(-sz*1.5,0);
    c.lineTo(-sz*1.5-sz*fl*2.5,-sz*.4*fl);
    c.lineTo(-sz*1.5-sz*fl*3.2,0);
    c.lineTo(-sz*1.5-sz*fl*2.5,sz*.4*fl);c.closePath();
    c.fillStyle=ti.fc;c.fill();
    c.beginPath();c.moveTo(-sz*1.5,0);
    c.lineTo(-sz*1.5-sz*fl,-sz*.15*fl);
    c.lineTo(-sz*1.5-sz*fl*1.5,0);
    c.lineTo(-sz*1.5-sz*fl,sz*.15*fl);c.closePath();
    c.fillStyle=ti.fi;c.fill();

    c.restore();

    // Threat ring
    if(e.threat>.5){
      c.beginPath();c.arc(ex,ey,sz*3,0,TAU*e.threat);
      c.strokeStyle=e.threat>.7?'#f44':'#fa0';c.lineWidth=1.5;c.stroke();
    }

    // Labels
    if($('cLb').checked){
      c.fillStyle=ti.c;c.font='bold 7px monospace';
      c.fillText(e.id,ex+sz*3,ey-sz*2);
      c.fillStyle='#aaa';c.font='7px monospace';
      c.fillText(`${ti.n} ${round(hypot(e.vx,e.vy))}m/s`,ex+sz*3,ey-sz*2+9);
      if(e.eng){c.fillStyle='#0cf';c.fillText('⚔',ex+sz*3,ey-sz*2+17)}
    }
  }

  // Interceptors
  for(const m of missiles){
    const mx=m.x*sX,my=m.y*sY;
    if(mx<-20||mx>vW+20||my<-20||my>vH+20)continue;
    const hd=atan2(m.vy,m.vx);
    const isTerm=m.ph==='term';

    c.save();c.translate(mx,my);c.rotate(hd);
    c.beginPath();
    c.moveTo(7,0);c.lineTo(2,-2.5);c.lineTo(-3,-2);c.lineTo(-5,-4);c.lineTo(-4,-1.5);
    c.lineTo(-6,0);c.lineTo(-4,1.5);c.lineTo(-5,4);c.lineTo(-3,2);c.lineTo(2,2.5);c.closePath();
    c.fillStyle=isTerm?'#0f8':'#0cf';c.fill();

    const fl=m.ff*(1+rand(-.15,.15));
    c.beginPath();c.moveTo(-6,0);c.lineTo(-6-fl*8,-1.5*fl);c.lineTo(-6-fl*11,0);c.lineTo(-6-fl*8,1.5*fl);c.closePath();
    c.fillStyle='#0fc';c.fill();
    c.beginPath();c.moveTo(-6,0);c.lineTo(-6-fl*4,-.8*fl);c.lineTo(-6-fl*5,0);c.lineTo(-6-fl*4,.8*fl);c.closePath();
    c.fillStyle='#fff8';c.fill();
    c.restore();

    // Guidance line
    if(m.tgt&&m.tgt.alive){
      c.beginPath();c.moveTo(mx,my);c.lineTo(m.tgt.x*sX,m.tgt.y*sY);
      c.strokeStyle=isTerm?'#0f81':'#0cf1';c.lineWidth=.5;c.setLineDash([2,3]);c.stroke();c.setLineDash([]);
    }

    if($('cLb').checked){
      c.fillStyle=isTerm?'#0f8':'#0cf';c.font='7px monospace';
      c.fillText(m.id,mx+9,my-4);
      c.fillStyle='#888';c.fillText(isTerm?'TERM':'MID',mx+9,my+4);
    }
  }

  // Explosions
  for(const e of explosions){
    const p=e.t/e.dur;
    const r=e.sz*(1+p*2.5)*(1-p*.2);
    const a=1-p;
    const grd=c.createRadialGradient(e.x*sX,e.y*sY,0,e.x*sX,e.y*sY,r);
    grd.addColorStop(0,`rgba(255,255,220,${a})`);
    grd.addColorStop(.3,e.c+hx(a*255));
    grd.addColorStop(.7,e.c+hx(a*100));
    grd.addColorStop(1,'transparent');
    c.beginPath();c.arc(e.x*sX,e.y*sY,r,0,TAU);c.fillStyle=grd;c.fill();
    if(e.sz>20){
      c.beginPath();c.arc(e.x*sX,e.y*sY,r*2*p,0,TAU);
      c.strokeStyle=e.c+hx(a*50);c.lineWidth=2;c.stroke();
    }
  }

  // Debris
  for(const d of debris){
    const a=cl(d.life/d.ml,0,1);
    c.save();c.translate(d.x*sX,d.y*sY);c.rotate(d.rot);
    c.fillStyle=`rgba(200,150,80,${a})`;c.fillRect(-d.sz,-d.sz*.5,d.sz*2,d.sz);
    c.restore();
  }

  // Particles
  for(const p of particles){
    const a=cl(p.life/p.ml,0,1);
    if(p.tp==='k'){
      c.beginPath();c.arc(p.x*sX,p.y*sY,p.sz*(1.5-a*.5),0,TAU);
      c.fillStyle=`rgba(140,140,140,${a*.2})`;c.fill();
    }else{
      c.beginPath();c.arc(p.x*sX,p.y*sY,p.sz*a,0,TAU);
      c.fillStyle=p.c+hx(a*200);c.fill();
    }
  }

  // HUD
  c.fillStyle='#0cf5';c.font='8px monospace';
  c.fillText(`T+${sT.toFixed(1)}s FPS:${fps} Q:${quality.toFixed(1)} E:${enemies.length} M:${missiles.length} P:${particles.length}`,6,12);
}

// ================ UI ================
function upUI(){
  O('sIn',stats.inn);O('sKl',stats.kills);O('sLk',stats.leak);O('sFr',stats.fired);
  const tot=stats.kills+stats.leak;
  const acc=tot?round(stats.kills/tot*100):0;
  $('sAc').textContent=acc+'%';
  const eff=stats.fired?round(stats.kills/stats.fired*100):0;
  O('sEf',eff+'%');

  let mt=0;for(const e of enemies)mt=max(mt,e.threat);
  const bt=$('bT');
  if(mt>.7){bt.textContent='▲ CRIT';bt.className=''}
  else if(mt>.3){bt.textContent='▲ WARN';bt.className='w'}
  else if(enemies.length){bt.textContent='▲ LOW';bt.className=''}
  else{bt.textContent='▲ CLR';bt.className=''}
  O('bTime',`T+${sT.toFixed(1)}`);

  // Tracks (limit DOM updates)
  const sorted=[...enemies].sort((a,b)=>b.threat-a.threat).slice(0,6);
  let th='';
  for(const t of sorted){
    const d=round(hypot(t.x-BX,t.y-BY)),sp=round(hypot(t.vx,t.vy));
    const tp=round(t.threat*100),tc=t.threat>.7?'#f44':t.threat>.4?'#fa0':'#0f8';
    th+=`<div class="ti" style="border-left:2px solid ${tc}"><div style="display:flex;justify-content:space-between"><span style="color:${tc}">●${t.id}</span><span style="color:#567">${TT[t.type].n}</span></div><div style="color:#567;font-size:7px">D:${d} V:${sp} ${t.eng?'⚔':''}${t.man?'↻':''}</div><div class="tb"><div class="tf" style="width:${tp}%;background:${tc}"></div></div></div>`;
  }
  $('tList').innerHTML=th;

  let lh='';
  for(const l of launchers){
    const c=l.st==='ok'?'#0f8':'#fa0';
    lh+=`<div class="dr"><span class="dl">PU-${l.id}</span><span class="dv" style="color:${c}">${l.m}/${l.mx} ${l.st==='rl'?'⟳'+l.rt.toFixed(1)+'s':'✓'}</span></div>`;
  }
  $('lSt').innerHTML=lh;

  $('mC').style.width=(ai.conf*100)+'%';O('mCv',round(ai.conf*100)+'%');
  $('mP').style.width=min(100,ai.pL*30)+'%';O('mPv',ai.pL.toFixed(4));
  $('mE').style.width=min(100,ai.ep/5)+'%';O('mEv',ai.ep);
  $('mI').style.width=min(100,ai.infT/20*100)+'%';O('mIv',round(ai.infT)+'ms');
  O('dBuf',ai.buf.length);

  if(fc%25===0){
    hAcc.push(acc);if(hAcc.length>80)hAcc.shift();
    hLoss.push(ai.pL);if(hLoss.length>80)hLoss.shift();
    miniC('ch1',hAcc,'#0f8');
    miniC('ch2',hLoss,'#f80');
    drawAttn('ch3');
  }
}

function miniC(id,data,color){
  const cv=$(id);if(!cv)return;
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=r.width;cv.height=r.height;
  const c=cv.getContext('2d'),w=cv.width,h=cv.height;
  c.clearRect(0,0,w,h);
  if(data.length<2)return;
  const mx=max(...data,.01),mn=min(...data,0),rg=mx-mn||1;
  c.beginPath();
  for(let i=0;i<data.length;i++){
    const x=i/(data.length-1)*w,y=h-((data[i]-mn)/rg)*h*.8-h*.05;
    i?c.lineTo(x,y):c.moveTo(x,y);
  }
  c.strokeStyle=color;c.lineWidth=1.5;c.stroke();
  c.lineTo(w,h);c.lineTo(0,h);c.closePath();c.fillStyle=color+'12';c.fill();
  c.fillStyle=color;c.font='8px monospace';c.fillText(data[data.length-1].toFixed(2),2,9);
}

function drawAttn(id){
  const cv=$(id);if(!cv||!ai.attn)return;
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=r.width;cv.height=r.height;
  const c=cv.getContext('2d'),w=cv.width,h=cv.height;
  c.clearRect(0,0,w,h);
  const a=ai.attn,n=a.n;if(n<1||n>15)return;
  const cs=min(w/n,h/n,12);
  const ox=(w-n*cs)/2,oy=(h-n*cs)/2;
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){
    const v=cl(a.d[i*n+j],0,1);
    c.fillStyle=`rgb(${round(v*255)},${round(v*80)},${round(255-v*200)})`;
    c.fillRect(ox+j*cs,oy+i*cs,cs-1,cs-1);
  }
  c.fillStyle='#678';c.font='7px monospace';c.fillText(`${n}×${n}`,2,h-2);
}

function log(m,t=''){const a=$('logC'),d=document.createElement('div');d.className='le '+t;d.textContent=`[${sT.toFixed(1)}] ${m}`;a.appendChild(d);a.scrollTop=1e9;while(a.children.length>150)a.removeChild(a.firstChild)}

// ================ CONTROLS ================
function togSim(){simOn=!simOn;$('btnP').textContent=simOn?'❚❚ PAUSE':'▶ START';$('btnP').classList.toggle('on',simOn)}
function rstSim(){
  simOn=false;sT=0;fc=0;lastWv=0;lastAI=0;
  enemies=[];missiles=[];explosions=[];particles=[];debris=[];aiDecs=[];
  stats={inn:0,kills:0,leak:0,fired:0};hAcc=[];hLoss=[];
  bgDrawn=false;stars=null;
  mkLau(+$('cNL').value);
  $('btnP').textContent='▶ START';$('btnP').classList.remove('on');
  $('logC').innerHTML='';log('Reset','a');
}
function rstAI(){ai=new AI();O('dPar',ai.np().toLocaleString());log('AI reset','a')}
function trainN(n){const t0=performance.now();ai.train(n);log(`Train ×${n}: ep=${ai.ep} loss=${ai.pL.toFixed(5)} ${(performance.now()-t0)|0}ms`,'a')}

// ================ MAIN LOOP (frame-budget aware) ================
let lt=0,fps=0,fpc=0,fpt=0;
let frameBudget=16; // target 60fps
let skipRender=false;

function loop(ts){
  const rdt=(ts-lt)/1000;
  lt=ts;

  // FPS tracking
  fpc++;fpt+=rdt;
  if(fpt>=1){
    fps=fpc;fpc=0;fpt=0;
    O('bFps',fps+' FPS');

    // Auto quality adjustment
    fpsHistory.push(fps);
    if(fpsHistory.length>5)fpsHistory.shift();
    const avgFps=fpsHistory.reduce((a,b)=>a+b,0)/fpsHistory.length;
    if(avgFps<25&&quality>0.3)quality-=0.1;
    else if(avgFps>50&&quality<1)quality+=0.1;
    quality=cl(quality,.3,1);
  }

  // Simulation update (always runs if active)
  if(simOn){
    const dt=min(rdt,.04)*G.spd;
    sT+=dt;fc++;
    update(dt);
  }

  // Render (skip if behind)
  const frameStart=performance.now();
  render();
  const renderTime=performance.now()-frameStart;

  // UI update (throttled)
  if(fc%6===0)upUI();

  requestAnimationFrame(loop);
}

window.addEventListener('load',init);
</script>
