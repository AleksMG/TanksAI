<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Mirror Cipher</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent: #06b6d4;
            --accent-hover: #0891b2;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .app-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .keyword-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .keyword-section label {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .keyword-section input {
            background: var(--bg-color);
            border: 2px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            font-size: 1.2rem;
            border-radius: 6px;
            outline: none;
            text-transform: uppercase;
            transition: 0.3s;
            width: 250px;
            text-align: center;
            letter-spacing: 2px;
        }

        .keyword-section input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        .workspace {
            display: flex;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .workspace {
                flex-direction: column;
            }
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            font-size: 1.1rem;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 6px;
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1rem;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        button.copy-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }

        button.copy-btn:hover {
            background-color: var(--border);
            color: var(--text-main);
            transform: none;
        }

        .status {
            text-align: center;
            margin-top: 1.5rem;
            min-height: 24px;
            color: var(--success);
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Phantom Mirror Cipher</h1>
        <p>Dynamic Axial Reflection & Bipolar Extraction</p>
    </div>

    <div class="app-container">
        
        <div class="keyword-section">
            <label for="keyword">SECRET KEYWORD:</label>
            <input type="text" id="keyword" value="LUNA" placeholder="ENTER KEYWORD">
        </div>

        <div class="workspace">
            
            <!-- Plaintext Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Plaintext</h2>
                    <button class="copy-btn" onclick="copyText('plaintext')">Copy</button>
                </div>
                <textarea id="plaintext" placeholder="Enter your secret message here..."></textarea>
            </div>

            <!-- Controls -->
            <div class="btn-group">
                <button onclick="handleEncrypt()">Encrypt ➔</button>
                <button onclick="handleDecrypt()">⬅ Decrypt</button>
            </div>

            <!-- Ciphertext Panel -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Ciphertext</h2>
                    <button class="copy-btn" onclick="copyText('ciphertext')">Copy</button>
                </div>
                <textarea id="ciphertext" placeholder="Encrypted output will appear here..."></textarea>
            </div>
            
        </div>

        <div id="status" class="status"></div>

    </div>

    <script>
        // --- CRYPTOGRAPHIC ENGINE ---
        
        const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        class PhantomMirror {
            constructor(keyword) {
                this.originalKeyword = keyword;
                this.resetState();
            }

            resetState() {
                // Sanitize keyword (Uppercase, letters only)
                let clean = this.originalKeyword.toUpperCase().replace(/[^A-Z]/g, "");
                if (!clean) clean = "PHANTOM"; // Default fallback

                this.array = [];
                // 1. Add unique letters from keyword
                for (let char of clean) {
                    if (!this.array.includes(char)) this.array.push(char);
                }
                
                // 2. Add remaining alphabet letters
                for (let char of ALPHABET) {
                    if (!this.array.includes(char)) this.array.push(char);
                }

                // 3. Initialize Mirror
                this.mirrorIndex = 0;
            }

            getReflectedIndex(targetIndex) {
                let oppositeMirror = (this.mirrorIndex + 13) % 26;
                
                // Rule 1: Target is on mirror -> swap to opposite
                if (targetIndex === this.mirrorIndex) return oppositeMirror;
                // Rule 2: Target is opposite mirror -> swap to mirror
                if (targetIndex === oppositeMirror) return this.mirrorIndex;
                
                // Standard reflection: (2 * Mirror - Plain) mod 26
                // In JS, % handles negative numbers poorly, so we add 26 and modulo again
                let calc = (2 * this.mirrorIndex - targetIndex) % 26;
                return (calc + 26) % 26; 
            }

            processChar(char, isEncrypt) {
                let upperChar = char.toUpperCase();
                // Pass spacing and punctuation through untouched
                if (!ALPHABET.includes(upperChar)) return char; 

                let targetIndex = this.array.indexOf(upperChar);
                let resultIndex = this.getReflectedIndex(targetIndex);
                let resultChar = this.array[resultIndex];

                // Identify Plaintext & Ciphertext
                let pChar = isEncrypt ? upperChar : resultChar;
                let cChar = isEncrypt ? resultChar : upperChar;

                // BIPOLAR EXTRACTION (The Non-Linear Shift)
                this.array = this.array.filter(c => c !== pChar && c !== cChar);
                this.array.unshift(cChar); // Jam cipher to front
                this.array.push(pChar);    // Jam plain to back

                // AUTO-KINETIC MOVEMENT (Move the mirror based on cipher letter)
                let cVal = cChar.charCodeAt(0) - 64; // A=1, B=2, etc.
                this.mirrorIndex = (this.mirrorIndex + cVal) % 26;

                // Preserve original case (optional, but nice for UI)
                return char === char.toLowerCase() ? resultChar.toLowerCase() : resultChar;
            }

            processText(text, isEncrypt) {
                this.resetState();
                let result = "";
                for (let i = 0; i < text.length; i++) {
                    result += this.processChar(text[i], isEncrypt);
                }
                return result;
            }
        }

        // --- UI INTERACTION LOGIC ---

        function showStatus(message) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = message;
            setTimeout(() => { statusEl.innerText = ""; }, 3000);
        }

        function handleEncrypt() {
            const keyword = document.getElementById('keyword').value;
            const plaintext = document.getElementById('plaintext').value;
            
            if (!plaintext.trim()) {
                showStatus("⚠️ Please enter plaintext to encrypt.");
                return;
            }

            const cipher = new PhantomMirror(keyword);
            const result = cipher.processText(plaintext, true);
            
            document.getElementById('ciphertext').value = result;
            showStatus("✓ Encryption Complete");
        }

        function handleDecrypt() {
            const keyword = document.getElementById('keyword').value;
            const ciphertext = document.getElementById('ciphertext').value;
            
            if (!ciphertext.trim()) {
                showStatus("⚠️ Please enter ciphertext to decrypt.");
                return;
            }

            const cipher = new PhantomMirror(keyword);
            const result = cipher.processText(ciphertext, false);
            
            document.getElementById('plaintext').value = result;
            showStatus("✓ Decryption Complete");
        }

        function copyText(elementId) {
            const el = document.getElementById(elementId);
            el.select();
            document.execCommand('copy');
            showStatus("✓ Copied to clipboard");
        }
    </script>
</body>
</html>
